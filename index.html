<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes App</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #notes { margin-top: 20px; }
    .note { padding: 10px; border: 1px solid #ccc; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>My Notes</h1>
  <textarea id="noteInput" placeholder="Write a note..." rows="4" cols="40"></textarea><br>
  <button id="addNote">Add Note</button>
  <button id="clearNotes">Clear All</button>

  <div id="notes"></div>

  <script>
    // Helper functions
    function saveToStorage(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    function getFromStorage(key, defaultValue = []) {
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : defaultValue;
    }

    function removeFromStorage(key) {
      localStorage.removeItem(key);
    }

    // Notes logic
    const notesContainer = document.getElementById("notes");
    const noteInput = document.getElementById("noteInput");
    const addNoteBtn = document.getElementById("addNote");
    const clearNotesBtn = document.getElementById("clearNotes");

    function renderNotes() {
      notesContainer.innerHTML = "";
      const notes = getFromStorage("notes");
      notes.forEach((note, index) => {
        const div = document.createElement("div");
        div.className = "note";
        div.textContent = note;
        // Add delete button for each note
        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.onclick = () => {
          notes.splice(index, 1);
          saveToStorage("notes", notes);
          renderNotes();
        };
        div.appendChild(delBtn);
        notesContainer.appendChild(div);
      });
    }

    addNoteBtn.onclick = () => {
      const note = noteInput.value.trim();
      if (note) {
        const notes = getFromStorage("notes");
        notes.push(note);
        saveToStorage("notes", notes);
        noteInput.value = "";
        renderNotes();
      }
    };

    clearNotesBtn.onclick = () => {
      removeFromStorage("notes");
      renderNotes();
    };

    // Initial render
    renderNotes();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Persistent To-Do List</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .todo { display: flex; align-items: center; margin-bottom: 8px; }
    .todo.completed span { text-decoration: line-through; color: gray; }
    button { margin-left: 10px; }
  </style>
</head>
<body>
  <h1>My To-Do List</h1>
  <input id="todoInput" type="text" placeholder="Add a new task">
  <button id="addBtn">Add</button>

  <div>
    <label>Filter: 
      <select id="filterSelect">
        <option value="all">All</option>
        <option value="active">Active</option>
        <option value="completed">Completed</option>
      </select>
    </label>
  </div>

  <div id="todoList"></div>

  <script>
    const STORAGE_KEY = "todos";
    const FILTER_KEY = "filter";

    // Helpers
    function saveToStorage(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }
    function getFromStorage(key, defaultValue = []) {
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : defaultValue;
    }

    // Load & Save
    function loadTodos() { return getFromStorage(STORAGE_KEY, []); }
    function saveTodos(todos) { saveToStorage(STORAGE_KEY, todos); }

    // Add Todo
    function addTodo(text) {
      const newTodo = {
        id: Date.now(),
        text,
        completed: false,
        createdAt: new Date().toISOString()
      };
      const todos = loadTodos();
      todos.push(newTodo);
      saveTodos(todos);
      renderTodos();
    }

    // Toggle Todo
    function toggleTodo(id) {
      const todos = loadTodos();
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.completed = !todo.completed;
        saveTodos(todos);
        renderTodos();
      }
    }

    // Delete Todo
    function deleteTodo(id) {
      let todos = loadTodos();
      todos = todos.filter(t => t.id !== id);
      saveTodos(todos);
      renderTodos();
    }

    // Render Todos
    function renderTodos() {
      const todos = loadTodos();
      const filter = getFromStorage(FILTER_KEY, "all");
      filterSelect.value = filter;

      let filtered = todos;
      if (filter === "active") filtered = todos.filter(t => !t.completed);
      if (filter === "completed") filtered = todos.filter(t => t.completed);

      todoList.innerHTML = "";
      filtered.forEach(todo => {
        const div = document.createElement("div");
        div.className = "todo" + (todo.completed ? " completed" : "");
        
        const span = document.createElement("span");
        span.textContent = todo.text;
        span.onclick = () => toggleTodo(todo.id);

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.onclick = () => deleteTodo(todo.id);

        div.appendChild(span);
        div.appendChild(delBtn);
        todoList.appendChild(div);
      });
    }

    // Filter handling
    const filterSelect = document.getElementById("filterSelect");
    filterSelect.onchange = () => {
      saveToStorage(FILTER_KEY, filterSelect.value);
      renderTodos();
    };

    // Add button
    const addBtn = document.getElementById("addBtn");
    const todoInput = document.getElementById("todoInput");
    addBtn.onclick = () => {
      const text = todoInput.value.trim();
      if (text) {
        addTodo(text);
        todoInput.value = "";
      }
    };

    // Init
    const todoList = document.getElementById("todoList");
    document.addEventListener("DOMContentLoaded", renderTodos);
  </script>
</body>
</html>
