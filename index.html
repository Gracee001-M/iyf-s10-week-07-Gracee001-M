<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes App</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #notes { margin-top: 20px; }
    .note { padding: 10px; border: 1px solid #ccc; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>My Notes</h1>
  <textarea id="noteInput" placeholder="Write a note..." rows="4" cols="40"></textarea><br>
  <button id="addNote">Add Note</button>
  <button id="clearNotes">Clear All</button>

  <div id="notes"></div>

  <script>
    // Helper functions
    function saveToStorage(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    function getFromStorage(key, defaultValue = []) {
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : defaultValue;
    }

    function removeFromStorage(key) {
      localStorage.removeItem(key);
    }

    // Notes logic
    const notesContainer = document.getElementById("notes");
    const noteInput = document.getElementById("noteInput");
    const addNoteBtn = document.getElementById("addNote");
    const clearNotesBtn = document.getElementById("clearNotes");

    function renderNotes() {
      notesContainer.innerHTML = "";
      const notes = getFromStorage("notes");
      notes.forEach((note, index) => {
        const div = document.createElement("div");
        div.className = "note";
        div.textContent = note;
        // Add delete button for each note
        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.onclick = () => {
          notes.splice(index, 1);
          saveToStorage("notes", notes);
          renderNotes();
        };
        div.appendChild(delBtn);
        notesContainer.appendChild(div);
      });
    }

    addNoteBtn.onclick = () => {
      const note = noteInput.value.trim();
      if (note) {
        const notes = getFromStorage("notes");
        notes.push(note);
        saveToStorage("notes", notes);
        noteInput.value = "";
        renderNotes();
      }
    };

    clearNotesBtn.onclick = () => {
      removeFromStorage("notes");
      renderNotes();
    };

    // Initial render
    renderNotes();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Persistent To-Do List</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .todo { display: flex; align-items: center; margin-bottom: 8px; }
    .todo.completed span { text-decoration: line-through; color: gray; }
    button { margin-left: 10px; }
  </style>
</head>
<body>
  <h1>My To-Do List</h1>
  <input id="todoInput" type="text" placeholder="Add a new task">
  <button id="addBtn">Add</button>

  <div>
    <label>Filter: 
      <select id="filterSelect">
        <option value="all">All</option>
        <option value="active">Active</option>
        <option value="completed">Completed</option>
      </select>
    </label>
  </div>

  <div id="todoList"></div>

  <script>
    const STORAGEKEY = "todos";
    const FILTER_KEY = "filter";

    // Helpers
    function saveToStorage(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }
    function getFromStorage(key, defaultValue = []) {
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : defaultValue;
    }

    // Load & Save
    function loadTodos() { return getFromStorage(STORAGE_KEY, []); }
    function saveTodos(todos) { saveToStorage(STORAGE_KEY, todos); }

    // Add Todo
    function addTodo(text) {
      const newTodo = {
        id: Date.now(),
        text,
        completed: false,
        createdAt: new Date().toISOString()
      };
      const todos = loadTodos();
      todos.push(newTodo);
      saveTodos(todos);
      renderTodos();
    }

    // Toggle Todo
    function toggleTodo(id) {
      const todos = loadTodos();
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.completed = !todo.completed;
        saveTodos(todos);
        renderTodos();
      }
    }

    // Delete Todo
    function deleteTodo(id) {
      let todos = loadTodos();
      todos = todos.filter(t => t.id !== id);
      saveTodos(todos);
      renderTodos();
    }

    // Render Todos
    function renderTodos() {
      const todos = loadTodos();
      const filter = getFromStorage(FILTER_KEY, "all");
      filterSelect.value = filter;

      let filtered = todos;
      if (filter === "active") filtered = todos.filter(t => !t.completed);
      if (filter === "completed") filtered = todos.filter(t => t.completed);

      todoList.innerHTML = "";
      filtered.forEach(todo => {
        const div = document.createElement("div");
        div.className = "todo" + (todo.completed ? " completed" : "");
        
        const span = document.createElement("span");
        span.textContent = todo.text;
        span.onclick = () => toggleTodo(todo.id);

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.onclick = () => deleteTodo(todo.id);

        div.appendChild(span);
        div.appendChild(delBtn);
        todoList.appendChild(div);
      });
    }

    // Filter handling
    const filterSelect = document.getElementById("filterSelect");
    filterSelect.onchange = () => {
      saveToStorage(FILTER_KEY, filterSelect.value);
      renderTodos();
    };

    // Add button
    const addBtn = document.getElementById("addBtn");
    const todoInput = document.getElementById("todoInput");
    addBtn.onclick = () => {
      const text = todoInput.value.trim();
      if (text) {
        addTodo(text);
        todoInput.value = "";
      }
    };

    // Init
    const todoList = document.getElementById("todoList");
    document.addEventListener("DOMContentLoaded", renderTodos);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auto-Save Contact Form</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    form { max-width: 400px; }
    input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
    button { padding: 8px 12px; }
  </style>
</head>
<body>
  <h1>Contact Form</h1>
  <form id="contact-form">
    <input type="text" name="name" placeholder="Your Name">
    <input type="email" name="email" placeholder="Your Email">
    <textarea name="message" placeholder="Your Message"></textarea>
    <button type="submit">Submit</button>
  </form>

  <script>
    const form = document.getElementById("contact-form");
    const inputs = form.querySelectorAll("input, textarea");

    // Load saved values on page load
    inputs.forEach(input => {
      const saved = sessionStorage.getItem(`form_${input.name}`);
      if (saved) {
        input.value = saved;
      }

      // Save on every input
      input.addEventListener("input", () => {
        sessionStorage.setItem(`form_${input.name}`, input.value);
      });
    });

    // Clear on successful submit
    form.addEventListener("submit", (e) => {
      e.preventDefault(); // prevent actual submission for demo
      inputs.forEach(input => {
        sessionStorage.removeItem(`form_${input.name}`);
      });
      alert("Form submitted successfully! Session storage cleared.");
      form.reset();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; }
    .products, .cart { margin-top: 20px; }
    .product, .cart-item { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; }
    .product img, .cart-item img { width: 80px; margin-right: 10px; }
    .cart-item span { flex: 1; }
  </style>
</head>
<body>
  <header>
    <h1>My Shop</h1>
    <div>Cart Items: <span id="cartCount">0</span></div>
  </header>

  <div class="products" id="productList"></div>

  <h2>Your Cart</h2>
  <div class="cart" id="cartList"></div>
  <div>Total: $<span id="cartTotal">0</span></div>
  <button id="clearCart">Clear Cart</button>

  <script>
    const STORAGE_KEY = "shoppingCartState";

    const state = {
      products: [
        { id: 1, name: "Laptop", price: 999, image: "https://via.placeholder.com/80?text=Laptop" },
        { id: 2, name: "Phone", price: 699, image: "https://via.placeholder.com/80?text=Phone" },
        { id: 3, name: "Headphones", price: 199, image: "https://via.placeholder.com/80?text=Headphones" }
      ],
      cart: []
    };

    // Persistence
    function saveCart() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.cart));
    }
    function loadCart() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) state.cart = JSON.parse(saved);
    }

    // Cart functions
    function addToCart(productId) {
      const existing = state.cart.find(item => item.productId === productId);
      if (existing) {
        existing.quantity++;
      } else {
        state.cart.push({ productId, quantity: 1 });
      }
      saveCart();
      renderCart();
    }

    function updateQuantity(productId, quantity) {
      const item = state.cart.find(i => i.productId === productId);
      if (item) {
        if (quantity <= 0) {
          removeFromCart(productId);
        } else {
          item.quantity = quantity;
        }
        saveCart();
        renderCart();
      }
    }

    function removeFromCart(productId) {
      state.cart = state.cart.filter(i => i.productId !== productId);
      saveCart();
      renderCart();
    }

    function clearCart() {
      state.cart = [];
      saveCart();
      renderCart();
    }

    function getCartTotal() {
      return state.cart.reduce((total, item) => {
        const product = state.products.find(p => p.id === item.productId);
        return total + (product.price * item.quantity);
      }, 0);
    }

    function getCartCount() {
      return state.cart.reduce((count, item) => count + item.quantity, 0);
    }

    // Rendering
    function renderProducts() {
      const container = document.getElementById("productList");
      container.innerHTML = "";
      state.products.forEach(p => {
        const div = document.createElement("div");
        div.className = "product";
        div.innerHTML = `
          <img src="${p.image}" alt="${p.name}">
          <span>${p.name} - $${p.price}</span>
          <button>Add to Cart</button>
        `;
        div.querySelector("button").onclick = () => addToCart(p.id);
        container.appendChild(div);
      });
    }

    function renderCart() {
      const container = document.getElementById("cartList");
      container.innerHTML = "";
      state.cart.forEach(item => {
        const product = state.products.find(p => p.id === item.productId);
        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <span>${product.name} - $${product.price}</span>
          <input type="number" min="0" value="${item.quantity}">
          <button>Remove</button>
        `;
        div.querySelector("input").onchange = (e) => updateQuantity(item.productId, parseInt(e.target.value));
        div.querySelector("button").onclick = () => removeFromCart(item.productId);
        container.appendChild(div);
      });

      document.getElementById("cartTotal").textContent = getCartTotal();
      document.getElementById("cartCount").textContent = getCartCount();
    }

    // Init
    document.getElementById("clearCart").onclick = clearCart;
    loadCart();
    renderProducts();
    renderCart();
  </script>
</body>
</html>
